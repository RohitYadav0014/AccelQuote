name: Trigger auto deployment for accelquote-ui

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/accelquote-ui-AutoDeployTrigger-f72c1f75-1cf8-4584-8490-71e16e4f8745.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACCELQUOTEUI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ACCELQUOTEUI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ACCELQUOTEUI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: accelquote.azurecr.io
          registryUsername: ${{ secrets.ACCELQUOTEUI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ACCELQUOTEUI_REGISTRY_PASSWORD }}
          containerAppName: accelquote-ui
          resourceGroup: AccelQuote
          imageToBuild: accelquote.azurecr.io/accelquote-ui:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


