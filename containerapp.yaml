location: eastus
name: accelquote-ui
resourceGroup: AccelQuote
properties:
  managedEnvironmentId: /subscriptions/YOUR_SUBSCRIPTION_ID/resourceGroups/AccelQuote/providers/Microsoft.App/managedEnvironments/accelquote-env
  configuration:
    registries:
    - server: accelquote.azurecr.io
      # ACR credentials will be automatically managed when using --registry-server flag
    ingress:
      external: true
      targetPort: 80
      transport: http
      allowInsecure: true
      traffic:
      - weight: 100
        latestRevision: true
    secrets: []
  template:
    containers:
    - image: accelquote.azurecr.io/accelquoteui:latest
      name: accelquote-ui
      resources:
        cpu: 0.25
        memory: 0.5Gi
      env:
      - name: REACT_APP_API_BASE_URL
        value: "http://20.246.20.79"
      - name: REACT_APP_USE_MOCK_API
        value: "false"
    scale:
      minReplicas: 1
      maxReplicas: 3
      rules:
      - name: http-scaling
        http:
          metadata:
            concurrentRequests: "10"
